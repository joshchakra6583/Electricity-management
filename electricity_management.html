<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Manager · Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: #f8fafc;
        }
        :root {
            --primary-blue: #3b82f6;
            --primary-dark: #1e293b;
            --bg-main: #f8fafc;
            --border: #e2e8f0;
            --low: #10b981;
            --medium: #f59e0b;
            --high: #ef4444;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        .nav-bar {
            background: white;
            border-bottom: 1px solid var(--border);
        }
        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
            padding: 0;
        }
        .nav-links a {
            display: inline-block;
            padding: 1rem 0;
            text-decoration: none;
            color: var(--primary-dark);
            font-weight: 500;
            border-bottom: 3px solid transparent;
            cursor: pointer;
        }
        .nav-links a.active {
            border-bottom-color: var(--primary-blue);
            color: var(--primary-blue);
        }
        main {
            margin-top: 2rem;
        }
        .btn-signin, .btn-register {
            display: inline-block;
            padding: 0.6rem 1.5rem;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }
        .btn-signin {
            background: var(--primary-blue);
            color: white;
        }
        .btn-register {
            background: white;
            color: var(--primary-dark);
            border: 2px solid white;
        }
        .auth-buttons {
            display: flex;
            gap: 1rem;
        }
        header {
            background: var(--primary-dark);
            color: white;
            padding: 1rem 2rem;
        }
        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 1.6rem;
            font-weight: 700;
        }
        .logo span {
            color: #fbbf24;
        }
    </style>
</head>
<body>
<header>
    <div class="container header-flex">
        <div class="logo">Energy<span>Manager</span></div>
        <div class="auth-buttons" id="loggedOut">
            <a href="#" class="btn-signin" onclick="showLogin(); return false;"><i class="fas fa-key"></i> Sign in</a>
            <a href="#" class="btn-register" onclick="showRegistration(); return false;"><i class="fas fa-user-plus"></i> Create account</a>
        </div>
        <div id="loggedIn" style="display: none; align-items: center; gap: 1rem;">
            <i class="fas fa-user-circle"></i> <span id="userName"></span>
            <button onclick="logout()" style="background:transparent; border:1px solid white; padding:0.3rem 1rem; border-radius:20px; color:white; cursor:pointer;">Logout</button>
        </div>
    </div>
</header>

<div class="nav-bar">
    <div class="container">
        <ul class="nav-links">
            <li><a class="active" onclick="showPage('home')">Home</a></li>
            <li><a onclick="showPage('about')">About</a></li>
            <li><a onclick="showPage('services')">Services</a></li>
            <li><a onclick="showPage('faq')">FAQ</a></li>
        </ul>
    </div>
</div>

<main class="container" id="mainContent"></main>

<script>
    function showLogin() {
        const main = document.getElementById('mainContent');
        main.innerHTML = `
            <div style="background:white; padding:2rem; border-radius:2rem; max-width:500px; margin:2rem auto;">
                <h2>Sign In</h2>
                <form id="loginForm">
                    <input type="email" id="login-email" placeholder="Email" style="width:100%; padding:0.8rem; margin:0.5rem 0; border:2px solid var(--border); border-radius:1rem;">
                    <input type="password" id="login-password" placeholder="Password" style="width:100%; padding:0.8rem; margin:0.5rem 0; border:2px solid var(--border); border-radius:1rem;">
                    <button type="submit" style="background: var(--primary-blue); color:white; padding:0.8rem; width:100%; border:none; border-radius:1rem;">Sign In</button>
                </form>
                <p>New user? <a href="#" onclick="showRegistration(); return false;">Create account</a></p>
            </div>
        `;
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            if(email && password) {
                localStorage.setItem('userName', email.split('@')[0]);
                window.location.href = "Profile Page.html";
            } else alert('Enter email and password');
        });
    }

    function showRegistration() {
        const main = document.getElementById('mainContent');
        main.innerHTML = `
            <div style="background:white; padding:2rem; border-radius:2rem; max-width:500px; margin:2rem auto;">
                <h2>Create Account</h2>
                <form id="registerForm">
                    <input type="text" id="fullname" placeholder="Full name" style="width:100%; padding:0.8rem; margin:0.5rem 0; border:2px solid var(--border); border-radius:1rem;">
                    <input type="email" id="email" placeholder="Email" style="width:100%; padding:0.8rem; margin:0.5rem 0; border:2px solid var(--border); border-radius:1rem;">
                    <input type="tel" id="phone" placeholder="Phone" style="width:100%; padding:0.8rem; margin:0.5rem 0; border:2px solid var(--border); border-radius:1rem;">
                    <input type="password" id="password" placeholder="Password" style="width:100%; padding:0.8rem; margin:0.5rem 0; border:2px solid var(--border); border-radius:1rem;">
                    <input type="password" id="confirm-password" placeholder="Confirm password" style="width:100%; padding:0.8rem; margin:0.5rem 0; border:2px solid var(--border); border-radius:1rem;">
                    <button type="submit" style="background: var(--primary-blue); color:white; padding:0.8rem; width:100%; border:none; border-radius:1rem;">Register</button>
                </form>
                <p>Already have an account? <a href="#" onclick="showLogin(); return false;">Sign in</a></p>
            </div>
        `;
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const pwd = document.getElementById('password').value;
            const confirm = document.getElementById('confirm-password').value;
            if(pwd !== confirm) return alert('Passwords do not match');
            localStorage.setItem('userName', document.getElementById('fullname').value);
            localStorage.setItem('userPhone', document.getElementById('phone').value);
            window.location.href = "Profile Page.html";
        });
    }

    function showPage(page) {
    const main = document.getElementById('mainContent');
    document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
    event.target.classList.add('active');

    if (page === 'home') {
        showLogin();
    }
    else if (page === 'about') {
        main.innerHTML = `
            <div style="background:white; padding:2rem; border-radius:2rem;">
                <h2> About Energy Manager</h2>
                <p>Energy Manager helps you track electricity consumption, earn rewards for saving energy, and understand your usage patterns — all in one place.</p>
                <div style="display:flex; gap:1rem; margin:1.5rem 0;">
                    <div><i class="fas fa-chart-line"></i> Track usage</div>
                    <div><i class="fas fa-gift"></i> Earn points</div>
                    <div><i class="fas fa-headset"></i> 24/7 support</div>
                </div>
                <div style="background:#f8fafc; padding:1rem; border-radius:1rem; margin-top:1rem;">
                    <strong> Data source:</strong> MSEDCL consumer patterns · Summer/winter variation · API-ready for live meter data.
                </div>
                <div style="margin-top:2rem; border-left:5px solid var(--primary-blue); background:#eef2ff; padding:1rem;">
                    <strong> Future scope:</strong> Weather integration · Mobile app · AI predictions · Online payments.
                </div>
            </div>
        `;
    }
    else if (page === 'services') {
        main.innerHTML = `
            <div style="background:white; padding:2rem; border-radius:2rem;">
                <h2> Our Services</h2>
                <ul>
                    <li> Consumption tracking (monthly / seasonal view)</li>
                    <li> Rewards & points system</li>
                    <li> Personalized passcode protection</li>
                    <li> 24/7 helpline support</li>
                    <li> Future mobile app integration</li>
                </ul>
            </div>
        `;
    }
    else if (page === 'faq') {
        main.innerHTML = `
            <div style="background:white; padding:2rem; border-radius:2rem;">
                <h2> Frequently Asked Questions</h2>
                <p><strong>Q1:</strong> How to earn points?<br> Keep consumption below 250 kWh = +50 points.</p>
                <p><strong>Q2:</strong> Is my data safe?<br> Yes — stored only in your browser (LocalStorage).</p>
                <p><strong>Q3:</strong> Can I use this on phone?<br> Fully responsive design.</p>
                <p><strong>Q4:</strong> What is an energy audit?<br> Professional home inspection to reduce waste (2000 pts).</p>
            </div>
        `;
    }
}

    function logout() {
        localStorage.clear();
        window.location.href = "Electricity Management.html";
    }

    showLogin();
</script>
</body>
</html>
